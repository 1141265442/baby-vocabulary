<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐启蒙 - Baby Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFF8F0;
            --bg-secondary: #FFEDDE;
            --bg-card: #FFFFFF;
            --macaron-blue: #FFB888;
            --macaron-pink: #FF9CAA;
            --macaron-peach: #FFCC99;
            --macaron-mint: #FFB6A6;
            --macaron-lavender: #E8B8D8;
            --macaron-yellow: #FFE4AA;
            --text-primary: #5A4A3A;
            --text-secondary: #8A7A6A;
            --text-tertiary: #AA9080;
            --success: #7AC89A;
            --pending: #FFA060;
            --shadow-sm: 0 2px 12px rgba(255, 150, 100, 0.08);
            --shadow-md: 0 6px 24px rgba(255, 150, 100, 0.12);
            --shadow-lg: 0 12px 40px rgba(255, 150, 100, 0.18);
            --toggle-bg: rgba(255, 255, 255, 0.95);
            --toggle-shadow: 0 4px 20px rgba(255, 150, 100, 0.15);
        }

        [data-theme="cool"] {
            --bg-primary: #E8EDF0;
            --bg-secondary: #DCE4E8;
            --bg-card: #FFFFFF;
            --macaron-blue: #9DB8D8;
            --macaron-pink: #B8C8E8;
            --macaron-peach: #C8D8E8;
            --macaron-mint: #A8D0C8;
            --macaron-lavender: #C8C0E0;
            --macaron-yellow: #D8E0D0;
            --text-primary: #2A3A4A;
            --text-secondary: #5A6A7A;
            --text-tertiary: #8A9AAA;
            --success: #5AB88A;
            --pending: #7AB8E8;
            --shadow-sm: 0 2px 12px rgba(100, 130, 160, 0.08);
            --shadow-md: 0 6px 24px rgba(100, 130, 160, 0.12);
            --shadow-lg: 0 12px 40px rgba(100, 130, 160, 0.18);
            --toggle-bg: rgba(255, 255, 255, 0.95);
            --toggle-shadow: 0 4px 20px rgba(100, 130, 160, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px 16px;
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--toggle-bg);
            border: none;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--toggle-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-icon {
            font-size: 16px;
        }

        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: var(--toggle-bg);
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--toggle-shadow);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 60px auto 0;
        }

        .header {
            text-align: center;
            padding: 30px 16px 40px;
        }

        .header-logo {
            font-size: 52px;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 8px rgba(255, 150, 150, 0.2));
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .lang-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--bg-card);
            color: var(--text-secondary);
            box-shadow: var(--shadow-sm);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .lang-btn:hover:not(.active) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .player-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
        }

        .song-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .song-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .song-category {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            padding: 6px 16px;
            background: var(--bg-secondary);
            border-radius: 15px;
            display: inline-block;
        }

        .progress-container {
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 8px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: scale(1.1);
            background: var(--macaron-peach);
        }

        .control-btn.play-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
            font-size: 28px;
        }

        .control-btn.play-btn:hover {
            transform: scale(1.1);
        }

        .control-btn.play-btn.playing {
            background: linear-gradient(135deg, var(--macaron-mint) 0%, var(--macaron-lavender) 100%);
        }

        .control-btn.loop-active {
            background: var(--macaron-yellow);
        }

        .lyrics {
            max-height: 120px;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            font-size: 14px;
            line-height: 2;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .lyrics::-webkit-scrollbar {
            width: 4px;
        }

        .lyrics::-webkit-scrollbar-thumb {
            background: var(--macaron-blue);
            border-radius: 2px;
        }

        .song-list {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow-md);
        }

        .song-list-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .song-items {
            display: grid;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .song-items::-webkit-scrollbar {
            width: 6px;
        }

        .song-items::-webkit-scrollbar-thumb {
            background: var(--macaron-blue);
            border-radius: 3px;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .song-item:hover {
            transform: translateX(4px);
            background: linear-gradient(90deg, var(--macaron-peach) 0%, transparent 100%);
        }

        .song-item.active {
            background: linear-gradient(90deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
        }

        .song-item-emoji {
            font-size: 28px;
        }

        .song-item-info {
            flex: 1;
        }

        .song-item-name {
            font-size: 15px;
            font-weight: 500;
        }

        .song-item-desc {
            font-size: 12px;
            opacity: 0.8;
        }

        .song-item-playing {
            font-size: 16px;
            opacity: 0;
        }

        .song-item.active .song-item-playing {
            opacity: 1;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .tip {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 10px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            display: inline-block;
        }

        .loading {
            display: none;
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 10px;
        }

        .loading.show {
            display: block;
        }

        @media (min-width: 768px) {
            body {
                padding: 40px 24px;
            }

            .theme-toggle {
                top: 24px;
                right: 24px;
                padding: 12px 16px;
                font-size: 14px;
            }

            .back-btn {
                top: 24px;
                left: 24px;
                padding: 12px 20px;
                font-size: 15px;
            }

            .container {
                margin-top: 80px;
            }

            .header h1 {
                font-size: 36px;
            }

            .song-items {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>

            <div class="controls">

                <button class="control-btn" onclick="prevSong()">

                </button>
                <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()">

                </button>
                <button class="control-btn" onclick="nextSong()">
                    ⏭️
                </button>
                <button class="control-btn" onclick="toggleMute()" id="muteBtn" title="静音">

                跑得快，跑得快<br>
                一只没有耳朵<br>
                一只没有尾巴<br>
                真奇怪，真奇怪

            <div class="loading" id="loading">🎵 加载中...</div>
        </div>

                <span>📋</span>
                <span>歌曲列表</span>
            </div>
            <div class="song-items" id="songItems">
            </div>
        </div>
    </div>

        // 当前状态
        let currentLang = 'english';
        let currentSongs = englishSongs;
        let currentIndex = 0;
        let isPlaying = false;
        let isLoop = false;

        // 获取音频元素
        const audioPlayer = document.getElementById('audioPlayer');

        // 初始化
        function init() {
            renderSongList();
            updatePlayer();
            setupAudioEvents();
            // 自动播放第一首歌
            setTimeout(() => {
                if (audioPlayer.paused) {
                    togglePlay();
                }
            }, 500);
        }

        // 设置音频事件
        function setupAudioEvents() {
            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('loadedmetadata', function() {
                document.getElementById('totalTime').textContent = formatTime(audioPlayer.duration);
            });
            audioPlayer.addEventListener('ended', function() {
                if (isLoop) {
                    audioPlayer.currentTime = 0;
                    audioPlayer.play();
                } else {
                    nextSong();
                }
            });
            audioPlayer.addEventListener('play', function() {
                isPlaying = true;
                updatePlayButton();
            });
            audioPlayer.addEventListener('pause', function() {
                isPlaying = false;
                updatePlayButton();
            });
            audioPlayer.addEventListener('loadstart', function() {
                showLoading(true);
            });
            audioPlayer.addEventListener('canplay', function() {
                showLoading(false);
            });
            audioPlayer.addEventListener('error', function() {
                const song = currentSongs[currentIndex];
                if (audioPlayer.src !== song.fallback) {
                    audioPlayer.src = song.fallback;
                    audioPlayer.load();
                }
            });
        }

        // 显示/隐藏加载状态
        function showLoading(show) {
            const loading = document.getElementById('loading');
            loading.classList.toggle('show', show);
        }

        // 切换语言
        function switchLanguage(lang) {
            currentLang = lang;
            currentSongs = lang === 'chinese' ? chineseSongs : englishSongs;
            currentIndex = 0;

            document.getElementById('englishBtn').classList.toggle('active', lang === 'english');
            document.getElementById('chineseBtn').classList.toggle('active', lang === 'chinese');

            renderSongList();
            updatePlayer();
            loadAudio();
            // 自动播放新语言的第一首歌
            setTimeout(() => {
                audioPlayer.play().catch(e => console.log('播放失败:', e));
            }, 100);
        }

        // 渲染歌曲列表
        function renderSongList() {
            const container = document.getElementById('songItems');
            container.innerHTML = currentSongs.map((song, index) => `
                <div class="song-item ${index === currentIndex ? 'active' : ''}" onclick="selectSong(${index})">
                    <span class="song-item-emoji">${song.emoji}</span>
                    <div class="song-item-info">
                        <div class="song-item-name">${song.name}</div>
                        <div class="song-item-desc">${song.desc}</div>
                    </div>
                    <span class="song-item-playing">🎵</span>
                </div>
            `).join('');
        }

        // 选择歌曲
        function selectSong(index) {
            audioPlayer.pause();
            currentIndex = index;
            updatePlayer();
            renderSongList();
            loadAudio();
            // 自动播放
            setTimeout(() => {
                audioPlayer.play().catch(e => console.log('播放失败:', e));
            }, 100);
        }

        // 更新播放器
        function updatePlayer() {
            const song = currentSongs[currentIndex];
            document.getElementById('songEmoji').textContent = song.emoji;
            document.getElementById('songTitle').textContent = song.name;
            document.getElementById('songCategory').textContent = song.desc;
            document.getElementById('lyrics').innerHTML = song.lyrics.replace(/\n/g, '<br>');
        }

        // 加载音频
        function loadAudio() {
            const song = currentSongs[currentIndex];
            audioPlayer.src = song.audio;
            audioPlayer.load();
        }

        // 切换播放/暂停
        function togglePlay() {
            if (audioPlayer.paused) {
                audioPlayer.play().catch(e => {
                    console.log('播放失败:', e);
                    alert('播放失败，请检查网络连接');
                });
            } else {
                audioPlayer.pause();
            }
        }

        // 更新播放按钮
        function updatePlayButton() {
            const btn = document.getElementById('playBtn');
            btn.textContent = isPlaying ? '⏸️' : '▶️';
            btn.classList.toggle('playing', isPlaying);
        }

        // 更新进度显示
        function updateProgress() {
            if (audioPlayer.duration) {
                const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('currentTime').textContent = formatTime(audioPlayer.currentTime);
            }
        }

        // 格式化时间
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // 进度条点击
        function seekProgress(event) {
            if (!audioPlayer.duration) return;
            const bar = document.getElementById('progressBar');
            const rect = bar.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        }

        // 上一首
        function prevSong() {
            audioPlayer.pause();
            currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
            updatePlayer();
            renderSongList();
            loadAudio();
            // 自动播放
            setTimeout(() => {
                audioPlayer.play().catch(e => console.log('播放失败:', e));
            }, 100);
        }

        // 下一首
        function nextSong() {
            audioPlayer.pause();
            currentIndex = (currentIndex + 1) % currentSongs.length;
            updatePlayer();
            renderSongList();
            loadAudio();
            // 自动播放
            setTimeout(() => {
                audioPlayer.play().catch(e => console.log('播放失败:', e));
            }, 100);
        }

        // 切换循环
        function toggleLoop() {
            isLoop = !isLoop;
            document.getElementById('loopBtn').classList.toggle('loop-active', isLoop);
        }

        // 切换静音
        function toggleMute() {
            audioPlayer.muted = !audioPlayer.muted;
            document.getElementById('muteBtn').textContent = audioPlayer.muted ? '🔇' : '🔊';
        }

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'warm' : 'cool';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleButton(newTheme);
        }

        function updateToggleButton(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'cool') {
                icon.textContent = '🌸';
                text.textContent = '温暖模式';
            } else {
                icon.textContent = '❄️';
                text.textContent = '清凉模式';
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'warm';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateToggleButton(savedTheme);
            init();
            loadAudio();
        });

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowLeft') {
                prevSong();
            } else if (e.code === 'ArrowRight') {
                nextSong();
            } else if (e.code === 'KeyL') {
                toggleLoop();
            }
        });
    </script>
