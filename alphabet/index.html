<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语字母学习 - Alphabet Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFF8F0;
            --bg-secondary: #FFEDDE;
            --bg-card: #FFFFFF;
            --macaron-blue: #FFB888;
            --macaron-pink: #FF9CAA;
            --macaron-peach: #FFCC99;
            --macaron-mint: #FFB6A6;
            --macaron-lavender: #E8B8D8;
            --macaron-yellow: #FFE4AA;
            --text-primary: #5A4A3A;
            --text-secondary: #8A7A6A;
            --success: #7AC89A;
            --error: #FF6B6B;
            --shadow-sm: 0 2px 12px rgba(255, 150, 100, 0.08);
            --shadow-md: 0 6px 24px rgba(255, 150, 100, 0.12);
            --shadow-lg: 0 12px 40px rgba(255, 150, 100, 0.18);
        }

        [data-theme="cool"] {
            --bg-primary: #E8EDF0;
            --bg-secondary: #DCE4E8;
            --macaron-blue: #9DB8D8;
            --macaron-pink: #B8C8E8;
            --macaron-peach: #C8D8E8;
            --macaron-mint: #A8D0C8;
            --macaron-lavender: #C8C0E0;
            --macaron-yellow: #D8E0D0;
            --text-primary: #2A3A4A;
            --text-secondary: #5A6A7A;
            --success: #5AB88A;
            --error: #E86B6B;
            --shadow-sm: 0 2px 12px rgba(100, 130, 160, 0.08);
            --shadow-md: 0 6px 24px rgba(100, 130, 160, 0.12);
            --shadow-lg: 0 12px 40px rgba(100, 130, 160, 0.18);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px 16px;
            color: var(--text-primary);
        }

        .theme-toggle, .back-btn {
            position: fixed;
            top: 16px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .theme-toggle:hover, .back-btn:hover { transform: scale(1.05); }
        .theme-toggle { right: 16px; }
        .back-btn { left: 16px; padding: 10px 16px; }

        /* 模式选择页面 */
        #modeSelect {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        .title {
            font-size: 48px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 600px;
            width: 100%;
        }

        .mode-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .mode-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .mode-icon { font-size: 44px; margin-bottom: 8px; }
        .mode-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .mode-desc { font-size: 12px; color: var(--text-secondary); }

        /* 游戏容器 */
        .game-container {
            display: none;
            max-width: 600px;
            margin: 60px auto 0;
            width: 100%;
            padding: 0 16px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .game-title { font-size: 24px; font-weight: 600; }
        .game-info { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

        .game-back {
            background: var(--bg-card);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* 字母卡片模式 */
        .letter-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .letter-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 20px;
        }

        .letter-upper {
            font-size: 100px;
            font-weight: 700;
            color: var(--macaron-pink);
            line-height: 1;
        }

        .letter-lower {
            font-size: 70px;
            font-weight: 600;
            color: var(--macaron-blue);
            line-height: 1;
        }

        .word-list {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .word-item {
            background: var(--bg-secondary);
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .word-item:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--macaron-peach), var(--macaron-pink));
        }

        .word-emoji { font-size: 28px; }
        .word-en { font-size: 12px; font-weight: 600; }
        .word-zh { font-size: 11px; color: var(--text-secondary); }

        .speak-btn {
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 18px;
            border-radius: 24px;
            cursor: pointer;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
        }

        .nav { display: flex; gap: 12px; justify-content: center; }

        .nav-btn {
            background: var(--bg-secondary);
            border: none;
            padding: 10px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: var(--shadow-sm);
            font-weight: 500;
        }

        .progress {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* 配对游戏 */
        .matching-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .match-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .match-card.flipped {
            background: white;
            color: var(--macaron-pink);
            border: 3px solid var(--macaron-pink);
        }

        .match-card.matched {
            visibility: hidden;
            opacity: 0;
        }

        /* 气球游戏 */
        .balloon-game {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
            height: 400px;
            overflow: hidden;
        }

        .target-letter {
            text-align: center;
            font-size: 48px;
            font-weight: 700;
            color: var(--macaron-pink);
            margin-bottom: 20px;
        }

        .balloon {
            position: absolute;
            font-size: 36px;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: float 3s ease-in-out infinite;
        }

        .balloon:hover { transform: scale(1.2); }
        .balloon.popped { animation: pop 0.3s ease forwards; }

        @keyframes pop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(2); opacity: 0; }
        }

        .balloon-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
        }

        /* 连线游戏 */
        .match-lines {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-lg);
        }

        .match-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .match-side {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-item {
            background: var(--bg-secondary);
            padding: 10px 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .match-item:hover { background: var(--macaron-peach); }
        .match-item.selected { background: var(--macaron-pink); color: white; }
        .match-item.matched { background: var(--success); color: white; }

        /* 字母歌 */
        .song-display {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .song-letters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }

        .song-letter {
            font-size: 32px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            background: var(--bg-secondary);
            transition: all 0.3s ease;
        }

        .song-letter.active {
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: white;
            transform: scale(1.2);
        }

        .song-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }

        .song-btn {
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .success-msg {
            text-align: center;
            font-size: 32px;
            color: var(--success);
            font-weight: 600;
            padding: 40px;
        }

        .success-emoji { font-size: 64px; margin-bottom: 16px; }

        @media (min-width: 768px) {
            .mode-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .matching-grid { grid-template-columns: repeat(6, 1fr); }
            .letter-upper { font-size: 120px; }
            .letter-lower { font-size: 90px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">❄️</span>
        <span id="themeText">清凉模式</span>
    </button>

    <a href="../index.html" class="back-btn">
        <span>🏠</span>
        <span>返回首页</span>
    </a>

    <!-- 模式选择页面 -->
    <div id="modeSelect">
        <div class="title">🅰️</div>
        <div class="subtitle">字母启蒙 - 选择游戏模式</div>
        <div class="mode-grid">
            <div class="mode-card" onclick="startCardMode()">
                <div class="mode-icon">📖</div>
                <div class="mode-name">字母卡片</div>
                <div class="mode-desc">学习26个字母</div>
            </div>
            <div class="mode-card" onclick="startMatchingMode()">
                <div class="mode-icon">🃏</div>
                <div class="mode-name">字母配对</div>
                <div class="mode-desc">记忆翻牌游戏</div>
            </div>
            <div class="mode-card" onclick="startBalloonMode()">
                <div class="mode-icon">🎈</div>
                <div class="mode-name">气球大爆炸</div>
                <div class="mode-desc">听音点字母</div>
            </div>
            <div class="mode-card" onclick="startLinesMode()">
                <div class="mode-icon">🔗</div>
                <div class="mode-name">字母连线</div>
                <div class="mode-desc">大小写配对</div>
            </div>
            <div class="mode-card" onclick="startSongMode()">
                <div class="mode-icon">🎵</div>
                <div class="mode-name">字母歌</div>
                <div class="mode-desc">ABC歌曲</div>
            </div>
        </div>
    </div>

    <!-- 字母卡片模式 -->
    <div id="cardMode" class="game-container">
        <button class="game-back" onclick="backToModeSelect()">⬅️ 返回</button>
        <div class="letter-card">
            <div class="letter-display">
                <span class="letter-upper" id="upperLetter">A</span>
                <span class="letter-lower" id="lowerLetter">a</span>
            </div>
            <div class="word-list" id="wordList"></div>
            <button class="speak-btn" onclick="speakLetter()">🔊 朗读</button>
            <div class="nav">
                <button class="nav-btn" onclick="prevLetter()">⬅️</button>
                <button class="nav-btn" onclick="nextLetter()">➡️</button>
            </div>
        </div>
        <div class="progress">
            <span id="current">1</span> / <span id="total">26</span>
        </div>
    </div>

    <!-- 配对游戏 -->
    <div id="matchingMode" class="game-container">
        <button class="game-back" onclick="backToModeSelect()">⬅️ 返回</button>
        <div class="game-header">
            <div class="game-title">🃏 字母配对</div>
            <div class="game-info">找出相同字母的大小写</div>
        </div>
        <div class="matching-grid" id="matchingGrid"></div>
        <div class="progress">配对: <span id="matchCount">0</span> / <span id="matchTotal">6</span></div>
    </div>

    <!-- 气球游戏 -->
    <div id="balloonMode" class="game-container">
        <button class="game-back" onclick="backToModeSelect()">⬅️ 返回</button>
        <div class="game-header">
            <div class="game-title">🎈 气球大爆炸</div>
            <div class="game-info">点击正确的气球！</div>
        </div>
        <div class="balloon-stats">
            <span>得分: <span id="balloonScore">0</span></span>
            <span>时间: <span id="balloonTime">60</span>s</span>
        </div>
        <div class="balloon-game" id="balloonGame">
            <div class="target-letter" id="targetLetter">A</div>
        </div>
    </div>

    <!-- 连线游戏 -->
    <div id="linesMode" class="game-container">
        <button class="game-back" onclick="backToModeSelect()">⬅️ 返回</button>
        <div class="game-header">
            <div class="game-title">🔗 字母连线</div>
            <div class="game-info">先点大写，再点对应小写</div>
        </div>
        <div class="match-lines">
            <div class="match-row" id="matchRow"></div>
        </div>
        <div class="progress">配对: <span id="lineCount">0</span> / <span id="lineTotal">6</span></div>
    </div>

    <!-- 字母歌 -->
    <div id="songMode" class="game-container">
        <button class="game-back" onclick="backToModeSelect()">⬅️ 返回</button>
        <div class="game-header">
            <div class="game-title">🎵 ABC 字母歌</div>
        </div>
        <div class="song-display">
            <div class="song-letters" id="songLetters"></div>
            <div class="song-controls">
                <button class="song-btn" id="playSongBtn" onclick="toggleSong()">▶️ 播放</button>
                <button class="song-btn" onclick="resetSong()">🔄 重播</button>
            </div>
        </div>
    </div>

    <!-- 胜利界面 -->
    <div id="winScreen" class="game-container" style="display: none;">
        <div class="success-msg">
            <div class="success-emoji">🎉</div>
            <div>太棒了！</div>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button class="song-btn" onclick="restartGame()">🔄 再玩一次</button>
            <button class="game-back" onclick="backToModeSelect()" style="margin-left: 10px;">⬅️ 返回</button>
        </div>
    </div>

    <script>
        // 字母数据
        const alphabetData = [
            { upper: 'A', lower: 'a', words: [{ en: 'Apple', zh: '苹果', emoji: '🍎' }, { en: 'Ant', zh: '蚂蚁', emoji: '🐜' }, { en: 'Airplane', zh: '飞机', emoji: '✈️' }]},
            { upper: 'B', lower: 'b', words: [{ en: 'Ball', zh: '球', emoji: '⚽' }, { en: 'Banana', zh: '香蕉', emoji: '🍌' }, { en: 'Bear', zh: '熊', emoji: '🐻' }]},
            { upper: 'C', lower: 'c', words: [{ en: 'Cat', zh: '猫', emoji: '🐱' }, { en: 'Car', zh: '汽车', emoji: '🚗' }, { en: 'Cake', zh: '蛋糕', emoji: '🍰' }]},
            { upper: 'D', lower: 'd', words: [{ en: 'Dog', zh: '狗', emoji: '🐶' }, { en: 'Duck', zh: '鸭子', emoji: '🦆' }, { en: 'Dolphin', zh: '海豚', emoji: '🐬' }]},
            { upper: 'E', lower: 'e', words: [{ en: 'Elephant', zh: '大象', emoji: '🐘' }, { en: 'Egg', zh: '鸡蛋', emoji: '🥚' }, { en: 'Eye', zh: '眼睛', emoji: '👁️' }]},
            { upper: 'F', lower: 'f', words: [{ en: 'Fish', zh: '鱼', emoji: '🐟' }, { en: 'Flower', zh: '花', emoji: '🌸' }, { en: 'Frog', zh: '青蛙', emoji: '🐸' }]},
            { upper: 'G', lower: 'g', words: [{ en: 'Grape', zh: '葡萄', emoji: '🍇' }, { en: 'Giraffe', zh: '长颈鹿', emoji: '🦒' }, { en: 'Goat', zh: '山羊', emoji: '🐐' }]},
            { upper: 'H', lower: 'h', words: [{ en: 'House', zh: '房子', emoji: '🏠' }, { en: 'Heart', zh: '爱心', emoji: '❤️' }, { en: 'Horse', zh: '马', emoji: '🐴' }]},
            { upper: 'I', lower: 'i', words: [{ en: 'Ice cream', zh: '冰淇淋', emoji: '🍦' }, { en: 'Insect', zh: '昆虫', emoji: '🐝' }, { en: 'Igloo', zh: '冰屋', emoji: '🏠' }]},
            { upper: 'J', lower: 'j', words: [{ en: 'Juice', zh: '果汁', emoji: '🧃' }, { en: 'Jump', zh: '跳', emoji: '🦘' }, { en: 'Jellyfish', zh: '水母', emoji: '🪼' }]},
            { upper: 'K', lower: 'k', words: [{ en: 'Kite', zh: '风筝', emoji: '🪁' }, { en: 'King', zh: '国王', emoji: '👑' }, { en: 'Koala', zh: '考拉', emoji: '🐨' }]},
            { upper: 'L', lower: 'l', words: [{ en: 'Lion', zh: '狮子', emoji: '🦁' }, { en: 'Lemon', zh: '柠檬', emoji: '🍋' }, { en: 'Leaf', zh: '叶子', emoji: '🍃' }]},
            { upper: 'M', lower: 'm', words: [{ en: 'Moon', zh: '月亮', emoji: '🌙' }, { en: 'Monkey', zh: '猴子', emoji: '🐵' }, { en: 'Mouse', zh: '老鼠', emoji: '🐭' }]},
            { upper: 'N', lower: 'n', words: [{ en: 'Nose', zh: '鼻子', emoji: '👃' }, { en: 'Nest', zh: '鸟巢', emoji: '🪺' }, { en: 'Night', zh: '夜晚', emoji: '🌃' }]},
            { upper: 'O', lower: 'o', words: [{ en: 'Orange', zh: '橙子', emoji: '🍊' }, { en: 'Owl', zh: '猫头鹰', emoji: '🦉' }, { en: 'Octopus', zh: '章鱼', emoji: '🐙' }]},
            { upper: 'P', lower: 'p', words: [{ en: 'Pig', zh: '猪', emoji: '🐷' }, { en: 'Panda', zh: '熊猫', emoji: '🐼' }, { en: 'Penguin', zh: '企鹅', emoji: '🐧' }]},
            { upper: 'Q', lower: 'q', words: [{ en: 'Queen', zh: '女王', emoji: '👸' }, { en: 'Quilt', zh: '被子', emoji: '🛏️' }, { en: 'Question', zh: '问题', emoji: '❓' }]},
            { upper: 'R', lower: 'r', words: [{ en: 'Rabbit', zh: '兔子', emoji: '🐰' }, { en: 'Rainbow', zh: '彩虹', emoji: '🌈' }, { en: 'Rose', zh: '玫瑰', emoji: '🌹' }]},
            { upper: 'S', lower: 's', words: [{ en: 'Star', zh: '星星', emoji: '⭐' }, { en: 'Sun', zh: '太阳', emoji: '☀️' }, { en: 'Snake', zh: '蛇', emoji: '🐍' }]},
            { upper: 'T', lower: 't', words: [{ en: 'Tiger', zh: '老虎', emoji: '🐯' }, { en: 'Tree', zh: '树', emoji: '🌳' }, { en: 'Train', zh: '火车', emoji: '🚂' }]},
            { upper: 'U', lower: 'u', words: [{ en: 'Umbrella', zh: '雨伞', emoji: '☂️' }, { en: 'Unicorn', zh: '独角兽', emoji: '🦄' }, { en: 'Up', zh: '向上', emoji: '⬆️' }]},
            { upper: 'V', lower: 'v', words: [{ en: 'Violin', zh: '小提琴', emoji: '🎻' }, { en: 'Vegetable', zh: '蔬菜', emoji: '🥦' }, { en: 'Van', zh: '货车', emoji: '🚐' }]},
            { upper: 'W', lower: 'w', words: [{ en: 'Water', zh: '水', emoji: '💧' }, { en: 'Whale', zh: '鲸鱼', emoji: '🐋' }, { en: 'Watermelon', zh: '西瓜', emoji: '🍉' }]},
            { upper: 'X', lower: 'x', words: [{ en: 'Xylophone', zh: '木琴', emoji: '🎵' }, { en: 'Box', zh: '盒子', emoji: '📦' }, { en: 'Fox', zh: '狐狸', emoji: '🦊' }]},
            { upper: 'Y', lower: 'y', words: [{ en: 'Yo-yo', zh: '悠悠球', emoji: '🪀' }, { en: 'Yogurt', zh: '酸奶', emoji: '🥛' }, { en: 'Yellow', zh: '黄色', emoji: '🟡' }]},
            { upper: 'Z', lower: 'z', words: [{ en: 'Zebra', zh: '斑马', emoji: '🦓' }, { en: 'Zoo', zh: '动物园', emoji: '🦁' }, { en: 'Zero', zh: '零', emoji: '0️⃣' }]}
        ];

        let currentMode = '';
        let currentIndex = 0;

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'warm' : 'cool';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'cool') {
                icon.textContent = '🌸';
                text.textContent = '温暖模式';
            } else {
                icon.textContent = '❄️';
                text.textContent = '清凉模式';
            }
        }

        // 模式切换
        function hideAllModes() {
            document.getElementById('modeSelect').style.display = 'none';
            document.getElementById('cardMode').style.display = 'none';
            document.getElementById('matchingMode').style.display = 'none';
            document.getElementById('balloonMode').style.display = 'none';
            document.getElementById('linesMode').style.display = 'none';
            document.getElementById('songMode').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
        }

        function backToModeSelect() {
            hideAllModes();
            document.getElementById('modeSelect').style.display = 'flex';
            clearInterval(balloonTimer);
            clearInterval(songTimer);
        }

        function showWinScreen() {
            hideAllModes();
            document.getElementById('winScreen').style.display = 'block';
        }

        // 字母卡片模式
        function startCardMode() {
            hideAllModes();
            document.getElementById('cardMode').style.display = 'block';
            updateCard();
        }

        function updateCard() {
            const letter = alphabetData[currentIndex];
            document.getElementById('upperLetter').textContent = letter.upper;
            document.getElementById('lowerLetter').textContent = letter.lower;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = alphabetData.length;

            const wordList = document.getElementById('wordList');
            wordList.innerHTML = letter.words.map(w => `
                <div class="word-item" onclick="speak('${w.en}')">
                    <div class="word-emoji">${w.emoji}</div>
                    <div class="word-en">${w.en}</div>
                    <div class="word-zh">${w.zh}</div>
                </div>
            `).join('');
        }

        function nextLetter() {
            currentIndex = (currentIndex + 1) % alphabetData.length;
            updateCard();
        }

        function prevLetter() {
            currentIndex = (currentIndex - 1 + alphabetData.length) % alphabetData.length;
            updateCard();
        }

        function speakLetter() {
            const letter = alphabetData[currentIndex];
            speak(letter.upper);
        }

        // 配对游戏
        let matchCards = [];
        let flippedCards = [];
        let matchedPairs = 0;

        function startMatchingMode() {
            hideAllModes();
            document.getElementById('matchingMode').style.display = 'block';
            initMatchingGame();
        }

        function initMatchingGame() {
            const pairsCount = 6;
            const letters = alphabetData.slice(0, pairsCount);
            matchCards = [];
            flippedCards = [];
            matchedPairs = 0;

            letters.forEach(l => {
                matchCards.push({ id: l.upper, letter: l.upper, type: 'upper', matched: false });
                matchCards.push({ id: l.lower, letter: l.lower, type: 'lower', matched: false });
            });

            // Shuffle
            matchCards.sort(() => Math.random() - 0.5);

            renderMatchingCards();
            document.getElementById('matchCount').textContent = '0';
            document.getElementById('matchTotal').textContent = pairsCount;
        }

        function renderMatchingCards() {
            const grid = document.getElementById('matchingGrid');
            grid.innerHTML = matchCards.map((card, i) => `
                <div class="match-card ${card.matched ? 'matched' : ''}" onclick="flipCard(${i})">
                    ${card.matched || !card.flipped ? '?' : card.letter}
                </div>
            `).join('');
        }

        function flipCard(index) {
            const card = matchCards[index];
            if (card.flipped || card.matched) return;

            card.flipped = true;
            flippedCards.push(index);

            renderMatchingCards();

            if (flippedCards.length === 2) {
                const [first, second] = flippedCards;
                if (matchCards[first].letter.toLowerCase() === matchCards[second].letter.toLowerCase()) {
                    matchCards[first].matched = true;
                    matchCards[second].matched = true;
                    matchedPairs++;
                    document.getElementById('matchCount').textContent = matchedPairs;
                    flippedCards = [];

                    if (matchedPairs === 6) {
                        setTimeout(showWinScreen, 500);
                    }
                } else {
                    setTimeout(() => {
                        matchCards[first].flipped = false;
                        matchCards[second].flipped = false;
                        flippedCards = [];
                        renderMatchingCards();
                    }, 800);
                }
            }
        }

        // 气球游戏
        let balloonScore = 0;
        let balloonTime = 60;
        let balloonTimer;
        let targetLetter = '';
        let balloons = [];

        function startBalloonMode() {
            hideAllModes();
            document.getElementById('balloonMode').style.display = 'block';
            initBalloonGame();
        }

        function initBalloonGame() {
            balloonScore = 0;
            balloonTime = 60;
            balloons = [];
            document.getElementById('balloonScore').textContent = '0';
            document.getElementById('balloonTime').textContent = '60';
            generateBalloons();
            nextTargetLetter();

            clearInterval(balloonTimer);
            balloonTimer = setInterval(() => {
                balloonTime--;
                document.getElementById('balloonTime').textContent = balloonTime;
                if (balloonTime <= 0) {
                    clearInterval(balloonTimer);
                    speak('Time\'s up! You scored ' + balloonScore);
                }
            }, 1000);
        }

        function generateBalloons() {
            const game = document.getElementById('balloonGame');
            const existing = game.querySelectorAll('.balloon');
            existing.forEach(e => e.remove());

            letters = alphabetData.slice(0, 8);
            balloons = [];

            letters.forEach((l, i) => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = l.upper;
                balloon.style.left = (10 + i * 11) + '%';
                balloon.style.top = (20 + Math.random() * 50) + '%';
                balloon.style.animationDelay = (i * 0.2) + 's';
                balloon.onclick = () => popBalloon(balloon, l.upper);
                game.appendChild(balloon);
                balloons.push({ element: balloon, letter: l.upper });
            });
        }

        function nextTargetLetter() {
            const randomIndex = Math.floor(Math.random() * 8);
            targetLetter = alphabetData[randomIndex].upper;
            document.getElementById('targetLetter').textContent = targetLetter;
            speak('Find ' + targetLetter);
        }

        function popBalloon(element, letter) {
            if (letter === targetLetter) {
                balloonScore++;
                document.getElementById('balloonScore').textContent = balloonScore;
                element.classList.add('popped');
                speak('Good! ' + letter);
                setTimeout(() => {
                    generateBalloons();
                    nextTargetLetter();
                }, 500);
            } else {
                element.style.animation = 'none';
                setTimeout(() => {
                    element.style.animation = 'float 3s ease-in-out infinite';
                }, 300);
            }
        }

        // 连线游戏
        let lineSelected = null;
        let lineMatches = 0;

        function startLinesMode() {
            hideAllModes();
            document.getElementById('linesMode').style.display = 'block';
            initLinesGame();
        }

        function initLinesGame() {
            lineSelected = null;
            lineMatches = 0;
            const pairsCount = 6;
            const letters = alphabetData.slice(0, pairsCount);

            const row = document.getElementById('matchRow');
            row.innerHTML = `
                <div class="match-side">
                    ${letters.map(l => `<div class="match-item" data-letter="${l.upper}" onclick="selectLineItem('${l.upper}', 'upper')">${l.upper}</div>`).join('')}
                </div>
                <div class="match-side">
                    ${letters.map(l => `<div class="match-item" data-letter="${l.lower}" onclick="selectLineItem('${l.lower}', 'lower')">${l.lower}</div>`).join('')}
                </div>
            `;

            document.getElementById('lineCount').textContent = '0';
            document.getElementById('lineTotal').textContent = pairsCount;
        }

        function selectLineItem(letter, type) {
            const items = document.querySelectorAll('.match-item');

            if (!lineSelected) {
                lineSelected = { letter, type };
                items.forEach(item => {
                    if (item.dataset.letter === letter) {
                        item.classList.add('selected');
                    }
                });
            } else {
                if (lineSelected.type !== type &&
                    alphabetData.find(l => l.upper === letter && l.lower === lineSelected.letter ||
                                       l.upper === lineSelected.letter && l.lower === letter)) {
                    // Match found
                    items.forEach(item => {
                        if ((item.dataset.letter === letter && item.dataset.letter.toLowerCase() === lineSelected.letter.toLowerCase()) ||
                            (item.dataset.letter === lineSelected.letter && item.dataset.letter.toLowerCase() === letter.toLowerCase())) {
                            item.classList.remove('selected');
                            item.classList.add('matched');
                        }
                    });
                    lineMatches++;
                    document.getElementById('lineCount').textContent = lineMatches;
                    speak('Good match!');

                    if (lineMatches === 6) {
                        setTimeout(showWinScreen, 500);
                    }
                } else {
                    // No match
                    items.forEach(item => item.classList.remove('selected'));
                    speak('Try again');
                }
                lineSelected = null;
            }
        }

        // 字母歌
        let songPlaying = false;
        let songTimer;
        let songIndex = 0;
        const songLyrics = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        function startSongMode() {
            hideAllModes();
            document.getElementById('songMode').style.display = 'block';
            initSong();
        }

        function initSong() {
            songIndex = 0;
            songPlaying = false;
            document.getElementById('playSongBtn').textContent = '▶️ 播放';

            const container = document.getElementById('songLetters');
            container.innerHTML = songLyrics.split('').map(l =>
                `<div class="song-letter" id="song-${l}">${l}</div>`
            ).join('');
        }

        function toggleSong() {
            if (songPlaying) {
                stopSong();
            } else {
                playSong();
            }
        }

        function playSong() {
            songPlaying = true;
            songIndex = 0;
            document.getElementById('playSongBtn').textContent = '⏸️ 暂停';

            nextSongLetter();
        }

        function nextSongLetter() {
            if (!songPlaying || songIndex >= songLyrics.length) {
                if (songIndex >= songLyrics.length) {
                    songPlaying = false;
                    document.getElementById('playSongBtn').textContent = '▶️ 播放';
                    speak('Now I know my ABCs!');
                }
                return;
            }

            // Remove active from previous
            if (songIndex > 0) {
                const prev = document.getElementById('song-' + songLyrics[songIndex - 1]);
                if (prev) prev.classList.remove('active');
            }

            // Add active to current
            const current = document.getElementById('song-' + songLyrics[songIndex]);
            if (current) current.classList.add('active');

            speak(songLyrics[songIndex]);
            songIndex++;

            songTimer = setTimeout(nextSongLetter, 1500);
        }

        function stopSong() {
            songPlaying = false;
            clearTimeout(songTimer);
            document.getElementById('playSongBtn').textContent = '▶️ 播放';
            document.querySelectorAll('.song-letter').forEach(el => el.classList.remove('active'));
        }

        function resetSong() {
            stopSong();
            setTimeout(() => playSong(), 300);
        }

        function restartGame() {
            if (currentMode === 'matching') initMatchingGame();
            else if (currentMode === 'balloon') initBalloonGame();
            else if (currentMode === 'lines') initLinesGame();
        }

        // 语音合成
        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('cardMode').style.display === 'block') {
                if (e.key === 'ArrowRight') nextLetter();
                if (e.key === 'ArrowLeft') prevLetter();
                if (e.key === ' ') speakLetter();
            }
        });

        // 页面加载时恢复主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'warm';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        });
    </script>
</body>
</html>
