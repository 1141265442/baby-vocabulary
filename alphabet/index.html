<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语字母学习 - Alphabet Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFF8F0;
            --bg-secondary: #FFEDDE;
            --bg-card: #FFFFFF;
            --macaron-blue: #FFB888;
            --macaron-pink: #FF9CAA;
            --macaron-peach: #FFCC99;
            --macaron-mint: #FFB6A6;
            --macaron-lavender: #E8B8D8;
            --macaron-yellow: #FFE4AA;
            --text-primary: #5A4A3A;
            --text-secondary: #8A7A6A;
            --success: #7AC89A;
            --shadow-sm: 0 2px 12px rgba(255, 150, 100, 0.08);
            --shadow-md: 0 6px 24px rgba(255, 150, 100, 0.12);
            --shadow-lg: 0 12px 40px rgba(255, 150, 100, 0.18);
        }

        [data-theme="cool"] {
            --bg-primary: #E8EDF0;
            --bg-secondary: #DCE4E8;
            --macaron-blue: #9DB8D8;
            --macaron-pink: #B8C8E8;
            --macaron-peach: #C8D8E8;
            --macaron-mint: #A8D0C8;
            --macaron-lavender: #C8C0E0;
            --macaron-yellow: #D8E0D0;
            --text-primary: #2A3A4A;
            --text-secondary: #5A6A7A;
            --success: #5AB88A;
            --shadow-sm: 0 2px 12px rgba(100, 130, 160, 0.08);
            --shadow-md: 0 6px 24px rgba(100, 130, 160, 0.12);
            --shadow-lg: 0 12px 40px rgba(100, 130, 160, 0.18);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px 16px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        /* 模式选择页面 */
        #modeSelect {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-top: 60px;
        }

        .title {
            font-size: 48px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }

        .mode-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid transparent;
        }

        .mode-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .mode-card:active {
            transform: scale(0.98);
        }

        .mode-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .mode-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .mode-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 字母卡片页面 */
        #cardMode {
            display: none;
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }

        .letter-card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .letter-display {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 30px;
        }

        .letter-upper {
            font-size: 120px;
            font-weight: 700;
            color: var(--macaron-pink);
            line-height: 1;
        }

        .letter-lower {
            font-size: 80px;
            font-weight: 600;
            color: var(--macaron-blue);
            line-height: 1;
        }

        .word-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .word-item {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 90px;
        }

        .word-item:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, var(--macaron-peach) 0%, var(--macaron-pink) 100%);
        }

        .word-emoji {
            font-size: 36px;
            margin-bottom: 6px;
        }

        .word-en {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .word-zh {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .speak-btn {
            background: linear-gradient(135deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }

        .speak-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .speak-btn:active {
            transform: scale(0.98);
        }

        .nav {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .nav-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-weight: 500;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .progress {
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 500;
        }

        .mode-back-btn {
            background: var(--bg-card);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .mode-back-btn:hover {
            transform: scale(1.05);
        }

        /* 即将上线 */
        .coming-soon {
            position: relative;
        }

        .coming-soon::after {
            content: '即将上线';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: var(--pending);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .coming-soon {
            opacity: 0.6;
            pointer-events: none;
        }

        @media (min-width: 768px) {
            .mode-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }

            .letter-upper {
                font-size: 140px;
            }

            .letter-lower {
                font-size: 100px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="theme-icon">❄️</span>
        <span id="themeText">清凉模式</span>
    </button>

    <a href="../index.html" class="back-btn">
        <span>🏠</span>
        <span>返回首页</span>
    </a>

    <!-- 模式选择页面 -->
    <div id="modeSelect">
        <div class="title">🅰️</div>
        <div class="subtitle">字母启蒙 - 选择游戏模式</div>

        <div class="mode-grid">
            <div class="mode-card" onclick="startCardMode()">
                <div class="mode-icon">📖</div>

                <div class="mode-desc">学习26个字母</div>
            </div>

            <div class="mode-card coming-soon">
                <div class="mode-icon">🃏</div>
                <div class="mode-name">字母配对</div>
                <div class="mode-desc">记忆翻牌游戏</div>
            </div>

            <div class="mode-card coming-soon">
                <div class="mode-icon">🎈</div>
                <div class="mode-name">气球大爆炸</div>
                <div class="mode-desc">听音点字母</div>
            </div>

            <div class="mode-card coming-soon">
                <div class="mode-icon">✏️</div>
                <div class="mode-name">拼写游戏</div>
                <div class="mode-desc">拖拽拼单词</div>
            </div>

            <div class="mode-card coming-soon">
                <div class="mode-icon">🔗</div>
                <div class="mode-name">字母连线</div>
                <div class="mode-desc">大小写配对</div>
            </div>

            <div class="mode-card coming-soon">
                <div class="mode-icon">🎵</div>
                <div class="mode-name">字母歌</div>
                <div class="mode-desc">ABC歌曲</div>
            </div>
        </div>
    </div>

    <!-- 字母卡片模式 -->
    <div id="cardMode">
        <button class="mode-back-btn" onclick="backToModeSelect()">⬅️ 返回模式选择</button>

        <div class="letter-card">
            <div class="letter-display">
                <span class="letter-upper" id="upperLetter">A</span>
                <span class="letter-lower" id="lowerLetter">a</span>
            </div>

            <div class="word-list" id="wordList"></div>

            <button class="speak-btn" id="speakBtn" onclick="speakLetter()">🔊 朗读字母</button>

            <div class="nav">
                <button class="nav-btn" onclick="prevLetter()">⬅️ 上一个</button>
                <button class="nav-btn" onclick="nextLetter()">下一个 ➡️</button>
            </div>
        </div>

        <div class="progress">
            <span id="current">1</span> / <span id="total">26</span>
        </div>
    </div>

    <script>
        // 字母数据
        const alphabetData = [
            { upper: 'A', lower: 'a', phonics: 'ei', words: [
                { en: 'Apple', zh: '苹果', emoji: '🍎' },

            { upper: 'G', lower: 'g', phonics: 'dʒi', words: [

            ]},
            { upper: 'J', lower: 'j', phonics: 'dʒei', words: [

                { en: 'Jump', zh: '跳', emoji: '🦘' },
                { en: 'Jellyfish', zh: '水母', emoji: '🪼' }
            ]},
            { upper: 'K', lower: 'k', phonics: 'kei', words: [
                { en: 'Kite', zh: '风筝', emoji: '🪁' },
                { en: 'King', zh: '国王', emoji: '👑' },
                { en: 'Koala', zh: '考拉', emoji: '🐨' }
            ]},
            { upper: 'L', lower: 'l', phonics: 'el', words: [
                { en: 'Lion', zh: '狮子', emoji: '🦁' },
                { en: 'Lemon', zh: '柠檬', emoji: '🍋' },

            ]},

            ]},

                { en: 'Owl', zh: '猫头鹰', emoji: '🦉' },

            ]},
            { upper: 'P', lower: 'p', phonics: 'pi', words: [

                { en: 'Panda', zh: '熊猫', emoji: '🐼' },
                { en: 'Penguin', zh: '企鹅', emoji: '🐧' }
            ]},
            { upper: 'Q', lower: 'q', phonics: 'kju', words: [

                { en: 'Quilt', zh: '被子', emoji: '🛏️' },

            ]},
            { upper: 'R', lower: 'r', phonics: 'aː', words: [

            ]},

                { en: 'Sun', zh: '太阳', emoji: '☀️' },

            ]},

                { en: 'Tiger', zh: '老虎', emoji: '🐯' },
                { en: 'Tree', zh: '树', emoji: '🌳' },

            ]},
            { upper: 'U', lower: 'u', phonics: 'ju', words: [

                { en: 'Unicorn', zh: '独角兽', emoji: '🦄' },

            ]},
            { upper: 'V', lower: 'v', phonics: 'vi', words: [
                { en: 'Violin', zh: '小提琴', emoji: '🎻' },
                { en: 'Vegetable', zh: '蔬菜', emoji: '🥦' },
                { en: 'Van', zh: '货车', emoji: '🚐' }
            ]},
            { upper: 'W', lower: 'w', phonics: 'ˈdʌbəlju', words: [
                { en: 'Water', zh: '水', emoji: '💧' },
                { en: 'Whale', zh: '鲸鱼', emoji: '🐋' },
                { en: 'Watermelon', zh: '西瓜', emoji: '🍉' }
            ]},
            { upper: 'X', lower: 'x', phonics: 'eks', words: [
                { en: 'Xylophone', zh: '木琴', emoji: '🎵' },
                { en: 'Box', zh: '盒子', emoji: '📦' },
                { en: 'Fox', zh: '狐狸', emoji: '🦊' }
            ]},
            { upper: 'Y', lower: 'y', phonics: 'wai', words: [
                { en: 'Yo-yo', zh: '悠悠球', emoji: '🪀' },
                { en: 'Yogurt', zh: '酸奶', emoji: '🥛' },
                { en: 'Yellow', zh: '黄色', emoji: '🟡' }
            ]},
            { upper: 'Z', lower: 'z', phonics: 'zi', words: [
                { en: 'Zebra', zh: '斑马', emoji: '🦓' },
                { en: 'Zoo', zh: '动物园', emoji: '🦁' },
                { en: 'Zero', zh: '零', emoji: '0️⃣' }
            ]}
        ];

        let currentIndex = 0;

        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'warm' : 'cool';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleButton(newTheme);
        }

        function updateToggleButton(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'cool') {
                if (icon) icon.textContent = '🌸';
                document.getElementById('themeText').textContent = '温暖模式';
            } else {
                if (icon) icon.textContent = '❄️';
                document.getElementById('themeText').textContent = '清凉模式';
            }
        }

        // 模式切换
        function startCardMode() {
            document.getElementById('modeSelect').style.display = 'none';
            document.getElementById('cardMode').style.display = 'block';
            updateCard();
        }

        function backToModeSelect() {
            document.getElementById('cardMode').style.display = 'none';
            document.getElementById('modeSelect').style.display = 'flex';
        }

        // 更新卡片
        function updateCard() {
            const letter = alphabetData[currentIndex];
            document.getElementById('upperLetter').textContent = letter.upper;
            document.getElementById('lowerLetter').textContent = letter.lower;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = alphabetData.length;

            // 更新单词列表
            const wordList = document.getElementById('wordList');
            wordList.innerHTML = letter.words.map(word => `
                <div class="word-item" onclick="speakWord('${word.en}')">
                    <div class="word-emoji">${word.emoji}</div>
                    <div class="word-en">${word.en}</div>
                    <div class="word-zh">${word.zh}</div>
                </div>
            `).join('');
        }

        function nextLetter() {
            currentIndex = (currentIndex + 1) % alphabetData.length;
            updateCard();
        }

        function prevLetter() {
            currentIndex = (currentIndex - 1 + alphabetData.length) % alphabetData.length;
            updateCard();
        }

        // 朗读字母
        function speakLetter() {
            const letter = alphabetData[currentIndex];
            const text = letter.upper + ', ' + letter.lower;
            speak(text);
        }

        // 朗读单词
        function speakWord(word) {
            speak(word);
        }

        // 语音合成
        function speak(text) {
            if (!('speechSynthesis' in window)) {
                alert('您的浏览器不支持语音功能');
                return;
            }

            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;

            speechSynthesis.speak(utterance);
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('cardMode').style.display === 'block') {
                if (e.key === 'ArrowRight') nextLetter();
                if (e.key === 'ArrowLeft') prevLetter();
                if (e.key === ' ' || e.key === 'Enter') speakLetter();
            }
        });

        // 页面加载时恢复主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'warm';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateToggleButton(savedTheme);
        });
    </script>
</body>
</html>
