<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡前故事 - Bedtime Stories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FFF8F0;
            --bg-secondary: #FFEDDE;
            --bg-card: #FFFFFF;
            --macaron-blue: #FFB888;
            --macaron-pink: #FF9CAA;
            --macaron-peach: #FFCC99;
            --macaron-mint: #FFB6A6;
            --macaron-lavender: #E8B8D8;
            --macaron-yellow: #FFE4AA;
            --text-primary: #5A4A3A;
            --text-secondary: #8A7A6A;
            --shadow-sm: 0 2px 12px rgba(255, 150, 100, 0.08);
            --shadow-md: 0 6px 24px rgba(255, 150, 100, 0.12);
            --shadow-lg: 0 12px 40px rgba(255, 150, 100, 0.18);
        }

        [data-theme="cool"] {
            --bg-primary: #E8EDF0;
            --bg-secondary: #DCE4E8;
            --macaron-blue: #9DB8D8;
            --macaron-pink: #B8C8E8;
            --macaron-peach: #C8D8E8;
            --macaron-mint: #A8D0C8;
            --macaron-lavender: #C8C0E0;
            --macaron-yellow: #D8E0D0;
            --text-primary: #2A3A4A;
            --text-secondary: #5A6A7A;
            --shadow-sm: 0 2px 12px rgba(100, 130, 160, 0.08);
            --shadow-md: 0 6px 24px rgba(100, 130, 160, 0.12);
            --shadow-lg: 0 12px 40px rgba(100, 130, 160, 0.18);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px 16px;
            color: var(--text-primary);
            transition: background 0.3s ease;
        }

        .theme-toggle, .back-btn {
            position: fixed;
            top: 16px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .theme-toggle:hover, .back-btn:hover { transform: scale(1.05); }
        .theme-toggle { right: 16px; }
        .back-btn { left: 16px; padding: 10px 16px; }

        /* 主页面 */
        .main-container {
            max-width: 900px;
            margin: 0 auto;
            padding-top: 60px;
        }

        .title {
            text-align: center;
            font-size: 42px;
            margin-bottom: 12px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .subtitle {
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .category-tabs {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .category-tab {
            background: var(--bg-card);
            border: none;
            padding: 14px 28px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .category-tab:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: white;
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .story-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            text-align: center;
        }

        .story-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .story-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .story-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .story-moral {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 故事阅读页面 */
        .story-reader {
            display: none;
            max-width: 700px;
            margin: 0 auto;
            padding-top: 60px;
        }

        .story-reader.active {
            display: block;
        }

        .story-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .story-emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .story-main-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--macaron-pink);
        }

        .story-moral-tag {
            font-size: 14px;
            color: var(--text-secondary);
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 16px;
            display: inline-block;
        }

        .story-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: var(--bg-card);
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            font-weight: 500;
            color: var(--text-primary);
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, var(--macaron-pink), var(--macaron-blue));
            color: white;
        }

        .story-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
            line-height: 2;
            font-size: 18px;
            color: var(--text-primary);
        }

        .story-content.size-small { font-size: 16px; }
        .story-content.size-large { font-size: 20px; }

        .story-paragraph {
            margin-bottom: 20px;
            text-indent: 2em;
        }

        .story-paragraph:last-child {
            margin-bottom: 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            margin-top: 24px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--macaron-pink), var(--macaron-blue));
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* 夜间模式 */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 6px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] .story-main-title {
            color: var(--macaron-peach);
        }

        @media (max-width: 600px) {
            .stories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .story-content {
                padding: 20px;
                font-size: 16px;
            }

            .story-controls {
                gap: 8px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
        <span id="themeIcon">❄️</span>
        <span id="themeText">清凉</span>
    </button>

    <a href="../index.html" class="back-btn">
        <span>🏠</span>
        <span>返回首页</span>
    </a>

    <!-- 主页面 -->
    <div class="main-container" id="mainContainer">

        <div class="subtitle">睡前故事 - 温馨时光</div>

        <div class="category-tabs">
            <button class="category-tab active" onclick="switchCategory('bedtime')">🌙 睡前故事</button>
            <button class="category-tab" onclick="switchCategory('fables')">🦊 寓言故事</button>
        </div>

        <div class="stories-grid" id="storiesGrid"></div>
    </div>

    <!-- 故事阅读页面 -->
    <div class="story-reader" id="storyReader">
        <div class="story-header">
            <div class="story-emoji" id="storyEmoji">🐰</div>
            <div class="story-main-title" id="storyTitle">故事标题</div>
            <div class="story-moral-tag" id="storyMoral">教育意义</div>
        </div>

        <div class="story-controls">
            <button class="control-btn" onclick="prevStory()">⬅️ 上一篇</button>
            <button class="control-btn primary" id="playBtn" onclick="toggleReading()">🔊 朗读</button>
            <button class="control-btn" onclick="adjustFontSize(-1)">🔤 小字</button>
            <button class="control-btn" onclick="adjustFontSize(1)">📏 大字</button>
            <button class="control-btn" onclick="toggleNightMode()">🌙 夜间</button>
            <button class="control-btn" onclick="backToList()">📋 列表</button>
            <button class="control-btn" onclick="nextStory()">➡️ 下一篇</button>
        </div>

        <div class="story-content" id="storyContent"></div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

兔妈妈走了不久，大灰狼来了。他捏着鼻子说："小兔子乖乖，把门儿开开，快点儿开开，我要进来。"

        let currentCategory = 'bedtime';
        let currentStories = bedtimeStories;
        let currentIndex = 0;
        let isReading = false;
        let fontSize = 0; // 0: normal, -1: small, 1: large
        let isNightMode = false;

        // 渲染故事列表
        function renderStories() {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = currentStories.map((story, index) => `
                <div class="story-card" onclick="openStory(${index})">
                    <div class="story-icon">${story.emoji}</div>
                    <div class="story-title">${story.title}</div>
                    <div class="story-moral">${story.moral}</div>
                </div>
            `).join('');
        }

        // 切换分类
        function switchCategory(category) {
            currentCategory = category;
            currentStories = category === 'bedtime' ? bedtimeStories : fableStories;
            currentIndex = 0;

            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');

            renderStories();
        }

        // 打开故事
        function openStory(index) {
            currentIndex = index;
            const story = currentStories[index];

            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('storyReader').classList.add('active');

            document.getElementById('storyEmoji').textContent = story.emoji;
            document.getElementById('storyTitle').textContent = story.title;
            document.getElementById('storyMoral').textContent = story.moral;

            const paragraphs = story.content.split('\n').filter(p => p.trim());
            document.getElementById('storyContent').innerHTML = paragraphs.map(p =>
                `<div class="story-paragraph">${p}</div>`
            ).join('');

            updateProgress();
            stopReading();
        }

        // 返回列表
        function backToList() {
            stopReading();
            document.getElementById('storyReader').classList.remove('active');
            document.getElementById('mainContainer').style.display = 'block';
        }

        // 上一篇
        function prevStory() {
            stopReading();
            currentIndex = (currentIndex - 1 + currentStories.length) % currentStories.length;
            openStory(currentIndex);
        }

        // 下一篇
        function nextStory() {
            stopReading();
            currentIndex = (currentIndex + 1) % currentStories.length;
            openStory(currentIndex);
        }

        // 朗读控制
        function toggleReading() {
            if (isReading) {
                stopReading();
            } else {
                startReading();
            }
        }

        function startReading() {
            isReading = true;
            document.getElementById('playBtn').textContent = '⏸️ 暂停';

            const story = currentStories[currentIndex];
            const paragraphs = story.content.split('\n').filter(p => p.trim());
            let paragraphIndex = 0;

            function readParagraph() {
                if (!isReading || paragraphIndex >= paragraphs.length) {
                    stopReading();
                    return;
                }

                // 高亮当前段落
                document.querySelectorAll('.story-paragraph').forEach((p, i) => {
                    p.style.color = i === paragraphIndex ? 'var(--macaron-pink)' : 'var(--text-primary)';
                });

                speak(paragraphs[paragraphIndex]);

                paragraphIndex++;
                setTimeout(readParagraph, 5500);
            }

            readParagraph();
        }

        function stopReading() {
            isReading = false;
            document.getElementById('playBtn').textContent = '🔊 朗读';
            document.querySelectorAll('.story-paragraph').forEach(p => {
                p.style.color = 'var(--text-primary)';
            });
            speechSynthesis.cancel();
        }

        // 字体大小调整
        function adjustFontSize(delta) {
            fontSize = Math.max(-1, Math.min(1, fontSize + delta));

            const content = document.getElementById('storyContent');
            content.classList.remove('size-small', 'size-large');
            if (fontSize === -1) content.classList.add('size-small');
            if (fontSize === 1) content.classList.add('size-large');
        }

        // 夜间模式
        function toggleNightMode() {
            isNightMode = !isNightMode;
            if (isNightMode) {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = '☀️';
                document.getElementById('themeText').textContent = '日间';
            } else {
                const savedTheme = localStorage.getItem('theme') || 'warm';
                document.documentElement.setAttribute('data-theme', savedTheme);
                updateThemeButton(savedTheme);
            }
        }

        // 进度更新
        function updateProgress() {
            const progress = ((currentIndex + 1) / currentStories.length * 100).toFixed(0);
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 主题切换
        function toggleTheme() {
            if (isNightMode) {
                toggleNightMode();
                return;
            }

            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'warm' : 'cool';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'cool') {
                icon.textContent = '🌸';
                text.textContent = '温暖';
            } else {
                icon.textContent = '❄️';
                text.textContent = '清凉';
            }
        }

        // 语音合成
        let bestVoice = null;
        
        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // 尝试获取最佳中文语音
            if (!bestVoice) {
                const voices = speechSynthesis.getVoices();
                // 优先选择中文语音
                const chineseVoices = voices.filter(v => v.lang.includes('zh'));
                if (chineseVoices.length > 0) {
                    // 优先选择 Microsoft 或 Google 的语音
                    bestVoice = chineseVoices.find(v => v.name.includes('Microsoft') || v.name.includes('Google')) 
                                || chineseVoices[0];
                }
            }
            
            if (bestVoice) {
                utterance.voice = bestVoice;
            }
            
            utterance.lang = 'zh-CN';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            
            speechSynthesis.speak(utterance);
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'warm';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);

            // 预加载语音
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                // 监听语音列表变化
                speechSynthesis.onvoiceschanged = function() {
                    bestVoice = null; // 重置，让speak函数重新选择
                };
            }

            renderStories();
        });

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (document.getElementById('storyReader').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevStory();
                if (e.key === 'ArrowRight') nextStory();
                if (e.key === ' ') { e.preventDefault(); toggleReading(); }
                if (e.key === 'Escape') backToList();
            }
        });
    </script>
