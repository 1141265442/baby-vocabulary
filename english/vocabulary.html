<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童英语词汇学习 - Kids Vocabulary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 温暖模式 - 暖色调样式 */
        :root {
            /* 背景 - 温暖柔和 */
            --bg-primary: #FFF8F0;
            --bg-secondary: #FFEDDE;
            --bg-card: #FFFFFF;

            /* 暖色系马卡龙 */
            --macaron-blue: #FFB888;
            --macaron-pink: #FF9CAA;
            --macaron-peach: #FFCC99;
            --macaron-mint: #FFB6A6;
            --macaron-lavender: #E8B8D8;
            --macaron-yellow: #FFE4AA;

            /* 文字 */
            --text-primary: #5A4A3A;
            --text-secondary: #8A7A6A;
            --text-tertiary: #AA9080;

            /* 功能色 */
            --success: #7AC89A;
            --pending: #FFA060;

            /* 阴影 */
            --shadow-sm: 0 2px 12px rgba(255, 150, 100, 0.08);
            --shadow-md: 0 6px 24px rgba(255, 150, 100, 0.12);
            --shadow-lg: 0 12px 40px rgba(255, 150, 100, 0.18);

            /* UI */
            --toggle-bg: rgba(255, 255, 255, 0.95);
            --toggle-shadow: 0 4px 20px rgba(255, 150, 100, 0.15);
        }

        /* 清凉模式 - 冷色调样式 */
        [data-theme="cool"] {
            --bg-primary: #E8EDF0;
            --bg-secondary: #DCE4E8;
            --bg-card: #FFFFFF;

            /* 冷色系马卡龙 */
            --macaron-blue: #9DB8D8;
            --macaron-pink: #B8C8E8;
            --macaron-peach: #C8D8E8;
            --macaron-mint: #A8D0C8;
            --macaron-lavender: #C8C0E0;
            --macaron-yellow: #D8E0D0;

            /* 文字 */
            --text-primary: #2A3A4A;
            --text-secondary: #5A6A7A;
            --text-tertiary: #8A9AAA;

            /* 功能色 */
            --success: #5AB88A;
            --pending: #7AB8E8;

            /* 阴影 */
            --shadow-sm: 0 2px 12px rgba(100, 130, 160, 0.08);
            --shadow-md: 0 6px 24px rgba(100, 130, 160, 0.12);
            --shadow-lg: 0 12px 40px rgba(100, 130, 160, 0.18);

            /* UI */
            --toggle-bg: rgba(255, 255, 255, 0.95);
            --toggle-shadow: 0 4px 20px rgba(100, 130, 160, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            padding: 20px 16px;
            color: var(--text-primary);
            transition: background 0.4s ease, color 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--toggle-bg);
            border: none;
            padding: 10px 14px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--toggle-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        .theme-icon {
            font-size: 16px;
        }

        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: var(--toggle-bg);
            border: none;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: var(--toggle-shadow);
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        .card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 100%;
            animation: fadeIn 0.5s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .emoji {
            font-size: 100px;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .english {
            font-size: 40px;
            color: var(--macaron-pink);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .chinese {
            font-size: 32px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .pronunciation {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-style: italic;
        }

        .speak-btn {
            background: linear-gradient(135deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .speak-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-lg);
        }

        .speak-btn:active {
            transform: scale(0.98);
        }

        .speak-btn.speaking {
            background: linear-gradient(135deg, var(--macaron-mint) 0%, var(--macaron-lavender) 100%);
        }

        .nav {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .nav-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-weight: 500;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: linear-gradient(90deg, var(--macaron-peach) 0%, transparent 100%);
        }

        .progress {
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 500;
        }

        /* 模式切换按钮 */
        .mode-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--bg-card);
            border: none;
            padding: 12px 20px;
            font-size: 15px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-weight: 500;
            color: var(--text-primary);
        }

        .mode-toggle:hover {
            transform: scale(1.05);
        }

        .mode-toggle.shuffle {
            background: linear-gradient(135deg, var(--macaron-mint) 0%, var(--macaron-lavender) 100%);
            color: white;
            box-shadow: var(--shadow-lg);
        }

        .mode-toggle.ordered {
            background: linear-gradient(135deg, var(--macaron-pink) 0%, var(--macaron-blue) 100%);
            color: white;
        }

        @media (min-width: 768px) {
            body {
                padding: 40px 24px;
            }

            .card {
                padding: 50px 40px;
            }

            .english {
                font-size: 48px;
            }

            .chinese {
                font-size: 36px;
            }

            .pronunciation {
                font-size: 20px;
            }

            .speak-btn {
                padding: 18px 40px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span class="theme-icon">❄️</span>
        <span id="themeText">清凉模式</span>
    </button>

    <a href="../index.html" class="back-btn">
        <span>🏠</span>
        <span>返回首页</span>
    </a>

    <button class="mode-toggle ordered" id="modeToggle" style="position: static; margin-bottom: 20px;">🔢 顺序</button>

    <div class="card">
        <div class="emoji" id="emoji">🥬</div>
        <div class="english" id="english">Chinese Cabbage</div>
        <div class="chinese" id="chinese">白菜</div>
        <div class="pronunciation" id="pronunciation">/ˌtʃaɪˈniːz ˈkæbɪdʒ/</div>
        <button class="speak-btn" id="speakBtn">🔊 朗读</button>
        <div class="nav">
            <button class="nav-btn" id="prevBtn">⬅️ 上一个</button>
            <button class="nav-btn" id="nextBtn">下一个 ➡️</button>
        </div>
    </div>
    <div class="progress">
        <span id="current">1</span> / <span id="total">40</span>
    </div>

    <script>
        // 主题切换
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'cool' ? 'warm' : 'cool';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleButton(newTheme);
        }

        function updateToggleButton(theme) {
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            if (theme === 'cool') {
                icon.textContent = '🌸';
                text.textContent = '温暖模式';
            } else {
                icon.textContent = '❄️';
                text.textContent = '清凉模式';
            }
        }

        const originalWords = [
            { emoji: "🥬", en: "Chinese Cabbage", zh: "白菜", pron: "/ˌtʃaɪˈniːz ˈkæbɪdʒ/" },
            { emoji: "✈️", en: "Airplane", zh: "飞机", pron: "/ˈɛrpleɪn/" },
            { emoji: "🚗", en: "Car", zh: "小汽车", pron: "/kɑːr/" },
            { emoji: "🍉", en: "Watermelon", zh: "西瓜", pron: "/ˈwɔːtərmɛlən/" },
            { emoji: "🍒", en: "Cherry", zh: "樱桃", pron: "/ˈtʃɛri/" },
            { emoji: "🐧", en: "Penguin", zh: "企鹅", pron: "/ˈpɛŋɡwɪn/" },
            { emoji: "🦉", en: "Owl", zh: "猫头鹰", pron: "/aʊl/" },
            { emoji: "🐴", en: "Horse", zh: "马", pron: "/hɔːrs/" },
            { emoji: "🐼", en: "Panda", zh: "熊猫", pron: "/ˈpændə/" },
            { emoji: "🔺", en: "Triangle", zh: "三角形", pron: "/ˈtraɪæŋɡəl/" },
            { emoji: "⭕", en: "Circle", zh: "圆形", pron: "/ˈsɜːrkəl/" },
            { emoji: "🐤", en: "Chick", zh: "小鸡", pron: "/tʃɪk/" },
            { emoji: "🐘", en: "Elephant", zh: "大象", pron: "/ˈɛlɪfənt/" },
            { emoji: "👣", en: "Footprint", zh: "脚印", pron: "/ˈfʊtprɪnt/" },
            { emoji: "✋", en: "Hand", zh: "手", pron: "/hænd/" },
            { emoji: "🍓", en: "Strawberry", zh: "草莓", pron: "/ˈstrɔːbɛri/" },
            { emoji: "🍇", en: "Grape", zh: "葡萄", pron: "/ɡreɪp/" },
            { emoji: "🍐", en: "Pear", zh: "梨", pron: "/pɛr/" },
            { emoji: "🍎", en: "Apple", zh: "苹果", pron: "/ˈæpəl/" },
            { emoji: "☁️", en: "Cloudy", zh: "多云", pron: "/ˈklaʊdi/" },
            { emoji: "🌙", en: "Night", zh: "晚上", pron: "/naɪt/" },
            { emoji: "⭐", en: "Star", zh: "星星", pron: "/stɑːr/" },
            { emoji: "❤️", en: "Heart", zh: "爱心", pron: "/hɑːrt/" },
            { emoji: "🌟", en: "Star", zh: "五角星", pron: "/stɑːr/" },
            { emoji: "👁️", en: "Eye", zh: "眼睛", pron: "/aɪ/" },
            { emoji: "🌽", en: "Corn", zh: "玉米", pron: "/kɔːrn/" },
            { emoji: "🍆", en: "Eggplant", zh: "茄子", pron: "/ˈɛɡplænt/" },
            { emoji: "🐿️", en: "Squirrel", zh: "松鼠", pron: "/ˈskwɜːrəl/" },
            { emoji: "🐌", en: "Snail", zh: "蜗牛", pron: "/sneɪl/" },
            { emoji: "🍅", en: "Persimmon", zh: "柿子", pron: "/pərˈsɪmən/" },
            { emoji: "🐝", en: "Bee", zh: "蜜蜂", pron: "/biː/" },
            { emoji: "🦋", en: "Butterfly", zh: "蝴蝶", pron: "/ˈbʌtərflaɪ/" },
            { emoji: "🐬", en: "Dolphin", zh: "海豚", pron: "/ˈdɑːlfɪn/" },
            { emoji: "🐟", en: "Fish", zh: "鱼", pron: "/fɪʃ/" },
            { emoji: "🐭", en: "Mouse", zh: "老鼠", pron: "/maʊs/" },
            { emoji: "🐱", en: "Cat", zh: "猫儿", pron: "/kæt/" },
            { emoji: "🐶", en: "Dog", zh: "小狗", pron: "/dɔːɡ/" },
            { emoji: "🦆", en: "Duck", zh: "鸭子", pron: "/dʌk/" },
            { emoji: "🐰", en: "Rabbit", zh: "小白兔", pron: "/ˈræbɪt/" }
        ];

        let words = [...originalWords];
        let currentIndex = 0;
        let isShuffle = false;
        let lastIndex = -1;
        let voicesLoaded = false;

        // 初始化语音（iOS需要）
        function initSpeech() {
            if ('speechSynthesis' in window) {
                speechSynthesis.getVoices();
                speechSynthesis.onvoiceschanged = function() {
                    voicesLoaded = true;
                    console.log('Voices loaded:', speechSynthesis.getVoices().length);
                };
            }
        }

        function toggleMode() {
            isShuffle = !isShuffle;
            const btn = document.getElementById('modeToggle');

            if (isShuffle) {
                btn.textContent = "🔀 乱序";
                btn.className = "mode-toggle shuffle";
            } else {
                const currentWord = words[currentIndex];
                words = [...originalWords];
                currentIndex = words.findIndex(w => w.en === currentWord.en);
                if (currentIndex === -1) currentIndex = 0;
                btn.textContent = "🔢 顺序";
                btn.className = "mode-toggle ordered";
            }
            updateCard();
        }

        function getRandomIndex() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * words.length);
            } while (newIndex === lastIndex && words.length > 1);
            lastIndex = newIndex;
            return newIndex;
        }

        function updateCard() {
            const word = words[currentIndex];
            document.getElementById('emoji').textContent = word.emoji;
            document.getElementById('english').textContent = word.en;
            document.getElementById('chinese').textContent = word.zh;
            document.getElementById('pronunciation').textContent = word.pron;
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = words.length;
        }

        function nextWord() {
            if (isShuffle) {
                currentIndex = getRandomIndex();
            } else {
                currentIndex = (currentIndex + 1) % words.length;
            }
            updateCard();
        }

        function prevWord() {
            if (isShuffle) {
                currentIndex = getRandomIndex();
            } else {
                currentIndex = (currentIndex - 1 + words.length) % words.length;
            }
            updateCard();
        }

        function speak() {
            if (!('speechSynthesis' in window)) {
                alert('您的浏览器不支持语音功能\n建议安装 Chrome 浏览器使用');
                return;
            }

            speechSynthesis.cancel();

            const word = words[currentIndex];
            const btn = document.getElementById('speakBtn');
            btn.classList.add('speaking');
            btn.textContent = '🔊 播放中...';

            const utterance = new SpeechSynthesisUtterance(word.en);
            utterance.lang = 'en';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;

            utterance.onend = function() {
                btn.classList.remove('speaking');
                btn.textContent = '🔊 朗读';
            };

            utterance.onerror = function(event) {
                console.log('Speech error:', event.error);
                btn.classList.remove('speaking');
                btn.textContent = '🔊 朗读';
            };

            setTimeout(() => {
                speechSynthesis.speak(utterance);
            }, 50);
        }

        // 绑定事件
        document.getElementById('speakBtn').addEventListener('click', speak);
        document.getElementById('speakBtn').addEventListener('touchend', function(e) {
            e.preventDefault();
            speak();
        });

        document.getElementById('nextBtn').addEventListener('click', nextWord);
        document.getElementById('prevBtn').addEventListener('click', prevWord);
        document.getElementById('modeToggle').addEventListener('click', toggleMode);

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextWord();
            if (e.key === 'ArrowLeft') prevWord();
            if (e.key === ' ' || e.key === 'Enter') speak();
            if (e.key === 's' || e.key === 'S') toggleMode();
        });

        // 页面加载时恢复主题
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'warm';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateToggleButton(savedTheme);
        });

        // 初始化
        initSpeech();
        updateCard();
    </script>
</body>
</html>
